<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    
    .page { display: none; }
    .page.active { display: block; }
    
    /* Auth Page */
    #auth-page { max-width: 400px; margin: 50px auto; padding: 30px; background: rgba(255,255,255,0.95); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    #auth-page h1 { text-align: center; color: #667eea; margin-bottom: 24px; }
    .auth-form input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
    .auth-form input:focus { outline: none; border-color: #667eea; }
    .auth-form button { width: 100%; padding: 12px; margin: 8px 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .auth-form button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .auth-toggle { text-align: center; margin-top: 16px; color: #666; }
    .auth-toggle a { color: #667eea; cursor: pointer; text-decoration: underline; }
    
    /* Navigation */
    nav { background: rgba(255,255,255,0.95); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    nav .logo { font-size: 24px; font-weight: bold; color: #667eea; }
    nav .nav-links { display: flex; gap: 16px; }
    nav .nav-links button { background: none; border: none; padding: 8px 16px; cursor: pointer; font-size: 14px; color: #333; border-radius: 8px; }
    nav .nav-links button:hover { background: #f0f0f0; }
    nav .nav-links button.active { background: #667eea; color: white; }
    nav .user-info { display: flex; align-items: center; gap: 12px; }
    
    /* Main Container */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    
    /* Games Grid */
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .game-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
    .game-card:hover { transform: translateY(-4px); }
    .game-card img { width: 100%; height: 160px; object-fit: cover; background: #667eea; }
    .game-card .info { padding: 16px; }
    .game-card .info h3 { margin-bottom: 8px; color: #333; }
    .game-card .info p { color: #666; font-size: 14px; margin-bottom: 8px; }
    .game-card .meta { display: flex; justify-content: space-between; font-size: 12px; color: #999; }
    
    /* Marketplace */
    .skins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .skin-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.1); cursor: pointer; }
    .skin-card:hover { transform: translateY(-4px); }
    .skin-preview { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 12px; border: 4px solid #eee; }
    .skin-card button { background: #667eea; color: white; border: none; padding: 8px 24px; border-radius: 8px; cursor: pointer; margin-top: 8px; }
    
    /* Studio */
    .studio-container { display: flex; gap: 20px; }
    .studio-editor { flex: 1; background: white; border-radius: 12px; padding: 20px; }
    .studio-sidebar { width: 300px; background: white; border-radius: 12px; padding: 20px; }
    .studio-editor textarea { width: 100%; height: 400px; font-family: monospace; font-size: 14px; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; }
    .studio-editor input, .studio-editor select { width: 100%; padding: 10px; margin: 8px 0; border: 2px solid #e0e0e0; border-radius: 8px; }
    
    /* Friends Panel */
    .friends-list { background: white; border-radius: 12px; padding: 16px; }
    .friend-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #eee; }
    .friend-item:last-child { border-bottom: none; }
    .friend-avatar { width: 40px; height: 40px; border-radius: 50%; background: #667eea; }
    .friend-status { width: 10px; height: 10px; border-radius: 50%; }
    .friend-status.online { background: #4caf50; }
    .friend-status.offline { background: #999; }
    
    /* Global Chat */
    .global-chat { position: fixed; bottom: 20px; right: 20px; width: 350px; background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); overflow: hidden; }
    .global-chat-header { background: #667eea; color: white; padding: 12px 16px; font-weight: bold; display: flex; justify-content: space-between; }
    .global-chat-messages { height: 300px; overflow-y: auto; padding: 16px; }
    .chat-msg { margin-bottom: 8px; padding: 8px; background: #f5f5f5; border-radius: 8px; }
    .chat-msg strong { color: #667eea; }
    .global-chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; }
    .global-chat-input input { flex: 1; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; margin-right: 8px; }
    .global-chat-input button { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    
    /* Loading Screen */
    #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: none; justify-content: center; align-items: center; z-index: 1000; }
    #loading-screen.active { display: flex; }
    .loading-content { text-align: center; color: white; }
    .spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Game Canvas */
    #game-canvas { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; display: none; }
    #game-canvas.active { display: block; }
    #game-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
    #game-ui.active { display: block; }
    #game-ui .ui-element { pointer-events: auto; }
    #toolbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(255,255,255,0.95); padding: 12px; border-radius: 12px; }
    .tool-btn { width: 50px; height: 50px; border: 2px solid #e0e0e0; border-radius: 8px; background: white; cursor: pointer; font-size: 20px; }
    .tool-btn.active { border-color: #667eea; background: #667eea; color: white; }
    #game-chat { position: absolute; bottom: 100px; left: 20px; width: 300px; }
    #game-chat-messages { max-height: 200px; overflow-y: auto; background: rgba(255,255,255,0.8); border-radius: 8px 8px 0 0; padding: 8px; }
    #game-chat-input { width: 100%; padding: 8px; border: 2px solid #e0e0e0; border-top: none; border-radius: 0 0 8px 8px; }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="spinner"></div>
      <h2>Loading...</h2>
      <p id="loading-text">Loading game data</p>
    </div>
  </div>

  <!-- Auth Page -->
  <div id="auth-page" class="page active">
    <h1>🎮 Roblox Clone</h1>
    <div id="login-form" class="auth-form">
      <input type="text" id="login-username" placeholder="Username">
      <input type="password" id="login-password" placeholder="Password">
      <button onclick="login()">Login</button>
      <div class="auth-toggle">Don't have an account? <a onclick="showRegister()">Register</a></div>
    </div>
    <div id="register-form" class="auth-form" style="display:none;">
      <input type="text" id="register-username" placeholder="Choose Username">
      <input type="password" id="register-password" placeholder="Choose Password">
      <button onclick="register()">Register</button>
      <div class="auth-toggle">Already have an account? <a onclick="showLogin()">Login</a></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="page">
    <nav>
      <div class="logo">🎮 Roblox Clone</div>
      <div class="nav-links">
        <button class="active" onclick="showPage('games')">Games</button>
        <button onclick="showPage('marketplace')">Marketplace</button>
        <button onclick="showPage('studio')">Studio</button>
        <button onclick="showPage('friends')">Friends</button>
      </div>
      <div class="user-info">
        <span id="current-user">Player</span>
        <button onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="container">
      <!-- Games Page -->
      <div id="games-page" class="page-section active">
        <h2 style="margin-bottom: 20px;">Discover Games</h2>
        <button onclick="showCreateGameModal()" style="background:#667eea;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;margin-bottom:20px;">+ Create Game</button>
        <div id="games-list" class="games-grid"></div>
      </div>

      <!-- Marketplace Page -->
      <div id="marketplace-page" class="page-section" style="display:none;">
        <h2 style="margin-bottom: 20px;">Free Skins Marketplace</h2>
        <div id="skins-list" class="skins-grid"></div>
      </div>

      <!-- Studio Page -->
      <div id="studio-page" class="page-section" style="display:none;">
        <h2 style="margin-bottom: 20px;">Roblox Studio - Create with Lua</h2>
        <div class="studio-container">
          <div class="studio-editor">
            <input type="text" id="game-name" placeholder="Game Name">
            <input type="text" id="game-desc" placeholder="Description">
            <select id="game-visibility">
              <option value="public">Public</option>
              <option value="private">Private</option>
            </select>
            <h3>Lua Script (like Roblox)</h3>
            <textarea id="lua-script" placeholder="-- Write your Lua script here&#10;print(&quot;Hello World!&quot;)"></textarea>
            <button onclick="saveGame()" style="background:#667eea;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;margin-top:12px;">Save Game</button>
          </div>
          <div class="studio-sidebar">
            <h3>Toolbox</h3>
            <div id="toolbox-models"></div>
            <button onclick="uploadModel()" style="background:#667eea;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;margin-top:12px;width:100%;">Upload Model</button>
          </div>
        </div>
      </div>

      <!-- Friends Page -->
      <div id="friends-page" class="page-section" style="display:none;">
        <h2 style="margin-bottom: 20px;">Friends</h2>
        <div style="margin-bottom: 20px;">
          <input type="text" id="friend-username" placeholder="Enter username" style="padding:10px;border:2px solid #e0e0e0;border-radius:8px;margin-right:8px;">
          <button onclick="addFriend()" style="background:#667eea;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;">Add Friend</button>
        </div>
        <div id="friends-list" class="friends-list"></div>
      </div>
    </div>

    <!-- Global Chat -->
    <div class="global-chat">
      <div class="global-chat-header">
        <span>Global Chat</span>
        <span style="cursor:pointer;" onclick="toggleChat()">✕</span>
      </div>
      <div id="global-chat-messages" class="global-chat-messages"></div>
      <div class="global-chat-input">
        <input type="text" id="global-chat-input" placeholder="Type a message..." onkeypress="handleGlobalChat(event)">
        <button onclick="sendGlobalChat()">Send</button>
      </div>
    </div>
  </div>

  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>
  <div id="game-ui">
    <div id="toolbar" class="ui-element">
      <button class="tool-btn active" onclick="selectTool('move')">🚶</button>
      <button class="tool-btn" onclick="selectTool('cube')">📦</button>
      <button class="tool-btn" onclick="selectTool('sphere')">⚽</button>
      <button class="tool-btn" onclick="selectTool('platform')">🟫</button>
      <button class="tool-btn" onclick="selectTool('delete')">🗑️</button>
    </div>
    <div id="game-chat" class="ui-element">
      <div id="game-chat-messages"></div>
      <input type="text" id="game-chat-input" placeholder="Chat..." onkeypress="handleGameChat(event)">
    </div>
    <button onclick="exitGame()" style="position:absolute;top:20px;right:20px;background:#ff4444;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;">Exit Game</button>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
